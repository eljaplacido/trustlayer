name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Read-only by default; individual jobs widen as needed.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Rust core + cynepic-guardian + trace-store sidecar.
  # The `server` feature gates the Axum binary and the HTTP integration tests.
  # ---------------------------------------------------------------------------
  rust:
    name: rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core-rs
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core-rs

      - run: cargo fmt -- --check
      - run: cargo clippy --features server --all-targets -- -D warnings
      - run: cargo test --features server

  # ---------------------------------------------------------------------------
  # Python SDK, Hermes, MCP server. Hermes + MCP both depend on the SDK so we
  # install it once with the dev extras and let the other suites resolve from
  # the same site-packages.
  # ---------------------------------------------------------------------------
  python:
    name: python (sdk + hermes + mcp) — ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            sdks/python/pyproject.toml
            mcp-server/pyproject.toml

      - name: Install Python SDK + MCP server (both with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e sdks/python[dev]
          pip install -e mcp-server[dev]

      - name: pytest — sdks/python
        run: pytest
        working-directory: sdks/python

      - name: pytest — skills/hermes
        run: pytest
        working-directory: skills/hermes

      - name: pytest — mcp-server
        env:
          PYTHONPATH: src:../sdks/python/src:../skills
        run: pytest
        working-directory: mcp-server

  # ---------------------------------------------------------------------------
  # TypeScript SDK + dashboard. Both layers run typecheck + tests; the
  # dashboard also runs the production build to catch Vite-only regressions.
  # ---------------------------------------------------------------------------
  typescript:
    name: typescript (${{ matrix.package }}) — node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]
        package:
          - sdks/typescript
          - dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: ${{ matrix.package }}/package-lock.json

      - run: npm ci
        working-directory: ${{ matrix.package }}

      - run: npm run typecheck
        working-directory: ${{ matrix.package }}

      - run: npm test
        working-directory: ${{ matrix.package }}

      - name: npm run build (dashboard only)
        if: matrix.package == 'dashboard'
        run: npm run build
        working-directory: ${{ matrix.package }}
